<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Podcast Design Canvas — Preview app</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #16211f;
        --muted: #5e6b67;
        --line: #d9e0dd;
        --panel: #f7faf8;
        --accent: #136f63;
        --accent-ink: #075246;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * { box-sizing: border-box; }

      html, body { height: 100%; }

      body {
        margin: 0;
        color: var(--ink);
        background: #ffffff;
        display: grid;
        grid-template-rows: auto 1fr;
        height: 100vh;
      }

      header.bar {
        background: linear-gradient(160deg, #1f7a6b, #0e3b34);
        color: #ffffff;
        padding: 12px 18px;
        display: flex;
        align-items: center;
        gap: 14px;
        flex-wrap: wrap;
      }

      header.bar h1 {
        font-size: 17px;
        margin: 0;
      }

      header.bar .sub {
        color: #cfe9e2;
        font-size: 13px;
      }

      header.bar a.catalog {
        margin-left: auto;
        color: #ffffff;
        font-size: 13px;
        font-weight: 700;
        text-decoration: none;
        border: 1px solid rgba(255, 255, 255, 0.55);
        border-radius: 8px;
        padding: 7px 11px;
      }

      header.bar a.catalog:hover,
      header.bar a.catalog:focus-visible {
        outline: 2px solid #ffffff;
        outline-offset: 2px;
      }

      .app {
        display: grid;
        grid-template-columns: 280px 1fr;
        min-height: 0;
      }

      nav.rail {
        border-right: 1px solid var(--line);
        background: var(--panel);
        overflow-y: auto;
        padding: 14px 12px 28px;
      }

      nav.rail h2 {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--muted);
        margin: 18px 6px 6px;
      }

      nav.rail h2:first-child {
        margin-top: 0;
      }

      nav.rail a {
        display: block;
        padding: 8px 10px;
        border-radius: 7px;
        color: var(--ink);
        text-decoration: none;
        font-size: 13px;
        font-weight: 600;
      }

      nav.rail a:hover {
        background: #eef4f2;
      }

      nav.rail a:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      nav.rail a[aria-current="page"] {
        background: #136f63;
        color: #ffffff;
      }

      .stage-frame {
        display: grid;
        grid-template-rows: auto 1fr;
        min-width: 0;
      }

      .crumb {
        border-bottom: 1px solid var(--line);
        padding: 9px 16px;
        font-size: 13px;
        color: var(--muted);
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .crumb strong {
        color: var(--ink);
      }

      .crumb .step-count {
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
      }

      .crumb .stepper {
        display: inline-flex;
        gap: 6px;
        margin-left: 6px;
      }

      .crumb .step-btn {
        color: var(--accent-ink);
        font-weight: 700;
        font-size: 13px;
        text-decoration: none;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 4px 9px;
      }

      .crumb .step-btn[aria-disabled="true"] {
        color: #9aa7a2;
        border-color: #eef2f0;
        pointer-events: none;
      }

      .crumb .step-btn:hover {
        background: #eef4f2;
      }

      .crumb .step-btn:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      .crumb a.open {
        margin-left: auto;
        color: var(--accent-ink);
        font-weight: 700;
        text-decoration: none;
        font-size: 13px;
      }

      .crumb a.open:hover {
        text-decoration: underline;
      }

      .crumb a.open:focus-visible {
        text-decoration: underline;
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      iframe#screen {
        width: 100%;
        height: 100%;
        border: 0;
        background: #ffffff;
      }

      @media (max-width: 760px) {
        .app { grid-template-columns: 1fr; }
        nav.rail { max-height: 38vh; }
      }
    </style>
  </head>
  <body>
    <header class="bar">
      <h1>Podcast Design Canvas</h1>
      <span class="sub">One preview — every screen loads here, in order.</span>
      <a class="catalog" href="./index.html">Shell home</a>
    </header>

    <div class="app">
      <nav class="rail" id="rail" aria-label="Episode workflow screens"></nav>
      <div class="stage-frame">
        <div class="crumb">
          <span>Now viewing:</span>
          <strong id="crumb-label">—</strong>
          <span class="step-count" id="step-count"></span>
          <span class="stepper">
            <a class="step-btn" id="prev-step" href="#" rel="prev">← Previous</a>
            <a class="step-btn" id="next-step" href="#" rel="next">Next →</a>
          </span>
          <a class="open" id="open-direct" href="#" target="_blank" rel="noopener">Open full screen ↗</a>
        </div>
        <iframe id="screen" title="Selected episode screen" src="about:blank"></iframe>
      </div>
    </div>

    <script>
      // The product's screens, grouped by where they fall in the episode workflow. Every
      // screen loads INSIDE this shell via the iframe, so the whole product is reachable
      // and navigable from one URL (preview/app.html#<screen>).
      const STAGES = [
        ["Bring in the recording", [
          "source-media-health", "episode-readiness", "speaker-role-mapping",
          "speaker-attribution-review", "speaker-visual-match", "speaker-eye-line-coherence",
          "guest-profile-reuse", "social-context-intake",
        ]],
        ["Sync & clean up audio", [
          "speaker-sync-repair", "audio-cleanup-controls", "pause-crosstalk-cleanup",
        ]],
        ["Captions & transcript", [
          "audio-caption-quality-review", "transcript-glossary", "transcript-search-navigation",
          "accessibility-readability-checks", "line-pickup-insert", "on-screen-correction-note",
        ]],
        ["Choose a visual direction", [
          "preset-style-picker", "preset-comparison-preview", "layout-safe-areas",
          "speaker-framing-safety", "canvas-layer-controls",
        ]],
        ["Add contextual visuals", [
          "contextual-broll-moments", "contextual-title-cards", "sensitive-moment-review",
        ]],
        ["Make it reusable", [
          "show-segment-system", "show-template-adaptation", "start-from-previous-episode",
          "episode-chapter-markers",
        ]],
        ["Review & publish", [
          "export-readiness-review", "episode-watch-through-preview", "export-package-handoff",
          "publish-checklist", "client-review-copy-flow", "destination-crop-preview",
          "thumbnail-cover-frame", "show-notes-assembly",
        ]],
      ];

      // Flat set of known screens — the iframe only ever loads a screen from this set, so a
      // hash can never point the frame at an arbitrary URL.
      const KNOWN = new Set();
      // The whole product in workflow order, so the shell can step through it like one
      // guided product (Previous / Next) — not just a directory of links.
      const ORDER = [];
      for (const [, screens] of STAGES) {
        for (const screen of screens) {
          KNOWN.add(screen);
          ORDER.push(screen);
        }
      }

      const railElement = document.querySelector("#rail");
      const frame = document.querySelector("#screen");
      const crumbLabel = document.querySelector("#crumb-label");
      const openDirect = document.querySelector("#open-direct");
      const stepCount = document.querySelector("#step-count");
      const prevStep = document.querySelector("#prev-step");
      const nextStep = document.querySelector("#next-step");

      function titleCase(slug) {
        return slug
          .split("-")
          .map((word) => word.charAt(0).toUpperCase() + word.slice(1))
          .join(" ");
      }

      const linkFor = {};
      railElement.replaceChildren(...STAGES.flatMap(([stage, screens]) => {
        const heading = document.createElement("h2");
        heading.textContent = stage;
        const links = screens.map((screen) => {
          const link = document.createElement("a");
          link.href = `#${screen}`;
          link.textContent = titleCase(screen);
          linkFor[screen] = link;
          return link;
        });
        return [heading, ...links];
      }));

      const firstScreen = STAGES[0][1][0];

      function currentScreen() {
        const hash = (window.location.hash || "").replace(/^#/, "");
        return KNOWN.has(hash) ? hash : firstScreen;
      }

      function route() {
        const screen = currentScreen();
        // Only ever load a known screen file — never an arbitrary hash value.
        frame.src = `../prototype/${screen}.html`;
        const label = titleCase(screen);
        crumbLabel.textContent = label;
        frame.title = `${label} screen`;
        openDirect.href = `../prototype/${screen}.html`;
        for (const [name, link] of Object.entries(linkFor)) {
          if (name === screen) {
            link.setAttribute("aria-current", "page");
          } else {
            link.removeAttribute("aria-current");
          }
        }

        // Step through the product in workflow order.
        const index = ORDER.indexOf(screen);
        stepCount.textContent = `Screen ${index + 1} of ${ORDER.length}`;
        setStep(prevStep, ORDER[index - 1]);
        setStep(nextStep, ORDER[index + 1]);
      }

      function setStep(button, target) {
        if (target) {
          button.href = `#${target}`;
          button.removeAttribute("aria-disabled");
          button.title = titleCase(target);
        } else {
          button.removeAttribute("href");
          button.setAttribute("aria-disabled", "true");
          button.removeAttribute("title");
        }
      }

      window.addEventListener("hashchange", route);
      route();
    </script>
  </body>
</html>
